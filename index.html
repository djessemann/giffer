<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>giffer — video to gif</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    padding: 1.5rem;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e0f12;
    color: #e8e8ea;
    text-align: center;
  }
  h1 { margin: 0; font-size: 2rem; letter-spacing: -0.02em; }
  p.sub { margin: 0; color: #9aa0a6; max-width: 28rem; }
  label.upload {
    display: inline-block;
    padding: 1rem 1.75rem;
    border: 2px dashed #3a3d44;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: border-color .15s, background .15s;
    background: #16181d;
  }
  label.upload:hover, label.upload.dragover { border-color: #4f8cff; background: #1b1e24; }
  label.upload.busy { opacity: .5; pointer-events: none; }
  input[type=file] { display: none; }
  #status { min-height: 1.5rem; color: #9aa0a6; font-variant-numeric: tabular-nums; }
  #result { display: none; flex-direction: column; align-items: center; gap: 1rem; }
  #result img { max-width: min(90vw, 480px); border-radius: 12px; background: #fff; }
  a.download {
    display: inline-block;
    padding: .85rem 1.5rem;
    background: #4f8cff;
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
  }
  small.hint { color: #6b7280; }
  footer { position: fixed; bottom: .75rem; font-size: .8rem; color: #4b4f57; }
  footer a { color: #6b7280; }
</style>
</head>
<body>
  <h1>giffer</h1>
  <p class="sub">Convert a video to a GIF.</p>

  <label class="upload" id="pick">
    <input type="file" id="file" accept="video/*" />
    Upload video
  </label>

  <div id="status"></div>

  <div id="result">
    <img id="preview" alt="your gif" />
    <a class="download" id="download" download="giffer.gif">Download GIF</a>
    <small class="hint">On a phone, long-press the image to save it to your camera roll.</small>
  </div>

  <footer><a href="https://github.com/djessemann/giffer">source on github</a></footer>

  <script>
  // Older versions of this app installed a service worker (for ffmpeg.wasm).
  // It sets cross-origin-isolation headers that block the CDN module below,
  // so remove any leftover worker and reload once into a clean state.
  if (navigator.serviceWorker && navigator.serviceWorker.controller) {
    navigator.serviceWorker.getRegistrations()
      .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
      .finally(function () {
        if (!sessionStorage.getItem("swCleared")) {
          sessionStorage.setItem("swCleared", "1");
          location.reload();
        }
      });
  } else if (navigator.serviceWorker) {
    navigator.serviceWorker.getRegistrations()
      .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); });
  }
  </script>

  <script type="module">
  import { GIFEncoder, quantize, applyPalette } from "https://unpkg.com/gifenc@1.0.3/dist/gifenc.esm.js";

  // If a leftover service worker is still controlling this load, the page is
  // about to reload itself (see above) — don't bother wiring up the app.
  if (!(navigator.serviceWorker && navigator.serviceWorker.controller)) {
    const FPS = 15;
    const MAX_WIDTH = 640;

    const pick = document.getElementById("pick");
    const fileInput = document.getElementById("file");
    const statusEl = document.getElementById("status");
    const resultEl = document.getElementById("result");
    const preview = document.getElementById("preview");
    const download = document.getElementById("download");

    const setStatus = (t) => { statusEl.textContent = t; };
    const tick = () => new Promise((r) => requestAnimationFrame(() => r()));

    function quantizeFrame(ctx, gif, w, h, delay) {
      const { data } = ctx.getImageData(0, 0, w, h);
      // Per-frame optimal 256-color palette → sharp, clear output.
      const palette = quantize(data, 256, { format: "rgb565" });
      const index = applyPalette(data, palette, "rgb565");
      gif.writeFrame(index, w, h, { palette, delay });
    }

    // Load a video as robustly as possible. iOS in particular needs the
    // element attached to the DOM, muted + playsinline, and an explicit
    // load(); the timeout surfaces an error instead of hanging forever.
    function loadVideo(file) {
      return new Promise((resolve, reject) => {
        const video = document.createElement("video");
        video.muted = true;
        video.defaultMuted = true;
        video.playsInline = true;
        video.setAttribute("playsinline", "");
        video.setAttribute("webkit-playsinline", "");
        video.setAttribute("muted", "");
        video.preload = "auto";
        video.style.cssText = "position:fixed;left:-9999px;top:0;width:1px;height:1px;opacity:0;pointer-events:none;";
        document.body.appendChild(video);

        const timer = setTimeout(() => {
          reject(new Error("Couldn't read that video — your browser may not support this format."));
        }, 20000);
        const ready = () => {
          if (video.videoWidth > 0 && isFinite(video.duration) && video.duration > 0) {
            clearTimeout(timer);
            resolve(video);
          }
        };
        ["loadedmetadata", "loadeddata", "canplay", "durationchange"].forEach((ev) =>
          video.addEventListener(ev, ready)
        );
        video.onerror = () => {
          clearTimeout(timer);
          reject(new Error("Couldn't read that video — the format may be unsupported."));
        };
        video.src = URL.createObjectURL(file);
        video.load();
      });
    }

    function destroyVideo(video) {
      try { URL.revokeObjectURL(video.src); } catch (e) {}
      try { video.removeAttribute("src"); video.load(); } catch (e) {}
      if (video.parentNode) video.parentNode.removeChild(video);
    }

    // Preferred path: play the video and grab real rendered frames via
    // requestVideoFrameCallback. Far more reliable than seeking on mobile.
    function captureByPlayback(video, w, h, onProgress) {
      return new Promise((resolve, reject) => {
        const canvas = document.createElement("canvas");
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        const gif = GIFEncoder();
        const interval = 1 / FPS;
        const delay = Math.round(1000 / FPS);
        let next = 0, count = 0, done = false;

        const finish = () => {
          if (done) return;
          done = true;
          if (count === 0) { try { ctx.drawImage(video, 0, 0, w, h); quantizeFrame(ctx, gif, w, h, delay); } catch (e) {} }
          gif.finish();
          resolve(gif.bytes());
        };
        const onFrame = (now, meta) => {
          const t = meta ? meta.mediaTime : video.currentTime;
          if (t + 1e-4 >= next) {
            ctx.drawImage(video, 0, 0, w, h);
            quantizeFrame(ctx, gif, w, h, delay);
            count++;
            next += interval;
            onProgress(Math.min(0.99, t / video.duration));
          }
          if (video.ended) { finish(); return; }
          video.requestVideoFrameCallback(onFrame);
        };

        video.addEventListener("ended", finish);
        video.onerror = () => { if (!done) reject(new Error("Playback failed during conversion.")); };
        video.currentTime = 0;
        video.play()
          .then(() => video.requestVideoFrameCallback(onFrame))
          .catch(() => reject(new Error("Couldn't play the video for conversion.")));
      });
    }

    // Fallback for browsers without requestVideoFrameCallback (e.g. Firefox):
    // step through the clip by seeking.
    async function captureBySeeking(video, w, h, onProgress) {
      const canvas = document.createElement("canvas");
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const gif = GIFEncoder();
      const delay = Math.round(1000 / FPS);
      const total = Math.max(1, Math.min(600, Math.floor(video.duration * FPS)));

      const seek = (t) => new Promise((resolve) => {
        let done = false;
        const fin = () => { if (done) return; done = true; video.removeEventListener("seeked", fin); clearTimeout(timer); resolve(); };
        const timer = setTimeout(fin, 3000); // never hang on a stubborn frame
        video.addEventListener("seeked", fin);
        video.currentTime = Math.abs(video.currentTime - t) < 1e-3 ? t + 1e-3 : t;
      });

      for (let i = 0; i < total; i++) {
        await seek(Math.min(video.duration - 1e-3, i / FPS));
        ctx.drawImage(video, 0, 0, w, h);
        quantizeFrame(ctx, gif, w, h, delay);
        onProgress((i + 1) / total);
        await tick(); // keep the UI responsive
      }
      gif.finish();
      return gif.bytes();
    }

    async function convert(file) {
      pick.classList.add("busy");
      resultEl.style.display = "none";
      preview.removeAttribute("src");
      download.removeAttribute("href");
      setStatus("Reading video…");

      let video;
      try {
        video = await loadVideo(file);

        const scale = Math.min(1, MAX_WIDTH / video.videoWidth);
        const w = Math.max(2, Math.round((video.videoWidth * scale) / 2) * 2);
        const h = Math.max(2, Math.round((video.videoHeight * scale) / 2) * 2);

        setStatus("Converting… 0%");
        const onProgress = (p) => setStatus("Converting… " + Math.round(p * 100) + "%");

        let bytes;
        if (typeof video.requestVideoFrameCallback === "function") {
          try {
            bytes = await captureByPlayback(video, w, h, onProgress);
          } catch (e) {
            console.warn("Playback capture failed, falling back to seeking.", e);
            bytes = await captureBySeeking(video, w, h, onProgress);
          }
        } else {
          bytes = await captureBySeeking(video, w, h, onProgress);
        }

        const blob = new Blob([bytes], { type: "image/gif" });
        const url = URL.createObjectURL(blob);

        preview.src = url;
        download.href = url;
        download.download = (file.name.replace(/\.[^.]+$/, "") || "giffer") + ".gif";
        resultEl.style.display = "flex";

        const kb = blob.size / 1024;
        setStatus("Done — " + (kb > 1024 ? (kb / 1024).toFixed(1) + " MB" : Math.round(kb) + " KB"));
      } catch (err) {
        console.error(err);
        setStatus(err && err.message ? err.message : String(err));
      } finally {
        if (video) destroyVideo(video);
        pick.classList.remove("busy");
      }
    }

    fileInput.addEventListener("change", () => {
      const f = fileInput.files && fileInput.files[0];
      if (f) convert(f);
      fileInput.value = ""; // allow re-picking the same file
    });

    // Drag a video file onto the "Upload video" button to add it.
    ["dragenter", "dragover"].forEach((ev) =>
      pick.addEventListener(ev, (e) => {
        e.preventDefault();
        if (!pick.classList.contains("busy")) pick.classList.add("dragover");
      })
    );
    ["dragleave", "dragend", "drop"].forEach((ev) =>
      pick.addEventListener(ev, () => pick.classList.remove("dragover"))
    );
    pick.addEventListener("drop", (e) => {
      e.preventDefault();
      if (pick.classList.contains("busy")) return;
      const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
      if (!f) return;
      if (f.type && f.type.indexOf("video/") !== 0) {
        setStatus("That doesn't look like a video file.");
        return;
      }
      convert(f);
    });

    // Don't let a missed drop navigate away from the page.
    window.addEventListener("dragover", (e) => e.preventDefault());
    window.addEventListener("drop", (e) => e.preventDefault());
  }
  </script>
</body>
</html>
